<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Login - LOUPIX Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a2847 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            scroll-behavior: smooth;
            overflow: hidden;
        }
        
        /* Animated Background Grid */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(96, 165, 250, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(96, 165, 250, 0.08) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
            pointer-events: none;
        }
        .owner-container {
            background: linear-gradient(135deg, rgba(26, 40, 71, 0.85) 0%, rgba(17, 29, 59, 0.85) 100%);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            border: 1.5px solid rgba(96, 165, 250, 0.3);
            box-shadow: 0 25px 50px -12px rgba(96, 165, 250, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 420px;
            padding: 45px;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }
        .owner-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(96, 165, 250, 0.15) 0%, transparent 70%);
            z-index: -1;
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, 20px); }
        }
        .owner-icon {
            text-align: center;
            font-size: 4rem;
            color: #60a5fa;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(96, 165, 250, 0.4);
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .owner-title {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 30px;
            color: #ffffff;
            position: relative;
            background: linear-gradient(135deg, #60a5fa 0%, #93c5fd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .owner-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(to right, #60a5fa, #3b82f6);
            border-radius: 3px;
            box-shadow: 0 0 15px rgba(96, 165, 250, 0.5);
        }
        .form-control {
            background: linear-gradient(135deg, rgba(96, 165, 250, 0.08) 0%, rgba(59, 130, 246, 0.04) 100%);
            border: 1.5px solid rgba(96, 165, 250, 0.3);
            color: #ffffff;
            padding: 14px 18px;
            border-radius: 12px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        .form-control:focus {
            background: linear-gradient(135deg, rgba(96, 165, 250, 0.12) 0%, rgba(59, 130, 246, 0.08) 100%);
            border-color: rgba(96, 165, 250, 0.8);
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.15);
            color: white;
            outline: none;
        }
        .btn-owner {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            color: #ffffff;
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 600;
            width: 100%;
            margin-top: 15px;
            transition: all 0.4s ease;
            box-shadow: 0 8px 20px rgba(96, 165, 250, 0.35);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .btn-owner::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }
        .btn-owner:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(96, 165, 250, 0.5);
        }
        .btn-owner:hover::before {
            left: 100%;
        }
        .btn-owner:active {
            transform: translateY(-1px);
        }
        .btn-owner:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error-alert {
            background: linear-gradient(135deg, rgba(248, 113, 113, 0.15) 0%, rgba(239, 68, 68, 0.1) 100%);
            border: 1.5px solid rgba(248, 113, 113, 0.4);
            border-left: 4px solid #f87171;
            color: #fca5a5;
            border-radius: 12px;
            padding: 16px 18px;
            margin-bottom: 25px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideDown 0.3s ease;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .form-label {
            font-size: 0.95rem;
            font-weight: 600;
            color: #a0aec0;
            transition: color 0.2s ease;
        }
        
        .form-group:focus-within .form-label {
            color: #60a5fa;
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #60a5fa;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        .back-link:hover {
            color: #93c5fd;
            transform: translateX(5px);
        }
    </style>
</head>
<body>
    <div class="owner-container">
        <div class="owner-icon">
            <i class="fas fa-crown"></i>
        </div>
        
        <h2 class="owner-title">
            Owner Login
        </h2>
        
        {% if error %}
        <div class="error-alert">
            <i class="fas fa-exclamation-circle me-2"></i> {{ error }}
        </div>
        {% endif %}
        
        <form method="POST" action="{{ url_for('owner_login') }}">
            <div class="form-group">
                <label for="username" class="form-label mb-2">
                    <i class="fas fa-user" style="color: #60a5fa;"></i> Username
                </label>
                <input type="text" class="form-control" id="username" name="username" 
                       placeholder="Enter your username" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label mb-2">
                    <i class="fas fa-lock" style="color: #60a5fa;"></i> Password
                </label>
                <input type="password" class="form-control" id="password" name="password" 
                       placeholder="Enter your password" required>
            </div>
            
            <button type="submit" class="btn btn-owner">
                <i class="fas fa-sign-in-alt me-2"></i> Owner Login
            </button>
        </form>
        
        <div class="text-center mt-5">
            <a href="/" class="back-link">
                <i class="fas fa-arrow-left"></i> Back to Main Login
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
