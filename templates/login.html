<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول المالك - LOUPIX Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .owner-container {
            background: rgba(15, 15, 35, 0.95);
            border-radius: 25px;
            border: 2px solid rgba(255, 193, 7, 0.3);
            box-shadow: 0 25px 50px -12px rgba(255, 193, 7, 0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }
        .owner-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 193, 7, 0.1) 0%, transparent 70%);
            z-index: -1;
        }
        .owner-icon {
            text-align: center;
            font-size: 4rem;
            color: #ffc107;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 193, 7, 0.5);
        }
        .owner-title {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 30px;
            color: #ffc107;
            position: relative;
        }
        .owner-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: linear-gradient(to right, #ffc107, #ff9800);
            border-radius: 3px;
        }
        .form-control {
            background: rgba(35, 35, 60, 0.8);
            border: 1px solid rgba(255, 193, 7, 0.3);
            color: #ffffff;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            background: rgba(45, 45, 75, 0.9);
            border-color: rgba(255, 193, 7, 0.7);
            box-shadow: 0 0 0 0.25rem rgba(255, 193, 7, 0.25);
            color: white;
        }
        .btn-owner {
            background: linear-gradient(45deg, #ffc107 0%, #ff9800 100%);
            color: #000;
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-size: 1.15rem;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
            transition: all 0.4s ease;
            box-shadow: 0 5px 15px rgba(255, 193, 7, 0.4);
        }
        .btn-owner:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 193, 7, 0.6);
        }
        .error-alert {
            background: rgba(220, 53, 69, 0.15);
            border: 1px solid rgba(220, 53, 69, 0.4);
            color: #ff9d9d;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 25px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="owner-container">
        <div class="owner-icon">
            <i class="fas fa-crown"></i>
        </div>
        
        <h2 class="owner-title">
            تسجيل دخول المالك
        </h2>
        
        {% if error %}
        <div class="error-alert">
            <i class="fas fa-exclamation-circle me-2"></i> {{ error }}
        </div>
        {% endif %}
        
        <form method="POST" action="{{ url_for('owner_login') }}">
            <div class="form-group">
                <label for="username" class="form-label text-light mb-2">
                    <i class="fas fa-user me-2"></i> اسم المستخدم
                </label>
                <input type="text" class="form-control" id="username" name="username" 
                       placeholder="اسم المستخدم" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label text-light mb-2">
                    <i class="fas fa-lock me-2"></i> كلمة المرور
                </label>
                <input type="password" class="form-control" id="password" name="password" 
                       placeholder="كلمة المرور" required>
            </div>
            
            <button type="submit" class="btn btn-owner">
                <i class="fas fa-sign-in-alt me-2"></i> دخول لوحة المالك
            </button>
        </form>
        
        <div class="text-center mt-4">
            <a href="/" class="text-warning text-decoration-none">
                <i class="fas fa-arrow-right me-1"></i> العودة لصفحة الدخول الرئيسية
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
