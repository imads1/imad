<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C4 Admin Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f1b 0%, #1a1a2e 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .panel {
            background: rgba(25, 25, 45, 0.95);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .panel h2 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .panel p {
            color: #aaa;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        input[type="password"] {
            width: 100%;
            padding: 15px;
            background: rgba(35, 35, 60, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
            transition: all 0.3s;
        }
        
        input[type="password"]:focus {
            border-color: #6a11cb;
            box-shadow: 0 0 0 2px rgba(106, 17, 203, 0.25);
        }
        
        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(37, 117, 252, 0.4);
        }
        
        .error-message {
            background: rgba(220, 53, 69, 0.15);
            border: 1px solid rgba(220, 53, 69, 0.4);
            color: #ff9d9d;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            font-weight: 500;
            display: none;
        }
        
        .security-note {
            margin-top: 20px;
            color: #666;
            font-size: 12px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="panel">
        <h2>ADMIN PANEL</h2>
        <p>Enter Admin Key To Continue</p>
        
        {% if error %}
        <div class="error-message" style="display: block;">
            {{ error }}
        </div>
        {% endif %}
        
        <form action="/admin/auth" method="POST">
            <input type="password" name="admin_key" placeholder="Admin Key" required>
            <button type="submit" class="login-btn">Continue</button>
        </form>
        
        <div class="security-note">
            Secure access restricted to authorized personnel only
        </div>
    </div>
</body>
</html>
